name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bun-checks:
    name: Bun static gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14 # keep in sync with packageManager in package.json

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (oxlint)
        if: ${{ !cancelled() }}
        run: bunx oxlint

      - name: Type-check (turbo)
        if: ${{ !cancelled() }}
        run: bun run type-check

      - name: Format check — TS (turbo)
        if: ${{ !cancelled() }}
        run: bunx turbo run fmt:check --filter='!@agentbull/bullx-native-addons'

      - name: Static analysis (kit analyze all)
        if: ${{ !cancelled() }}
        run: bun run analyze

  rust-checks:
    name: Rust static gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/native-addons
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/native-addons

      - name: Format check (rustfmt)
        if: ${{ !cancelled() }}
        run: cargo fmt --check

      - name: Lint (clippy)
        if: ${{ !cancelled() }}
        run: cargo clippy
