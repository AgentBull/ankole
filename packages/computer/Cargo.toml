[package]
name = "bullx-computerd"
version = "0.1.0"
edition = "2024"
description = "BullX Computer worker daemon (bullx-computerd)"
license = "Apache-2.0"
publish = false

[[bin]]
name = "bullx-computerd"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
axum = { version = "0.8", features = ["macros"] }
axum-server = { version = "0.8", features = ["tls-rustls"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
uuid = { version = "1.23.3", features = ["v4", "v7", "serde", "fast-rng"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
dashmap = "6"
bytes = "1"
futures = "0.3"
async-stream = "0.3"
tokio-util = { version = "0.7", features = ["io"] }
tar = "0.4"
flate2 = "1"
rustls = "0.23"
rustls-pemfile = "2"
base64 = "0.22"
blake3 = "1"
chacha20poly1305 = "0.10"
hex = "0.4"
thiserror = "2"
anyhow = "1"
clap = { version = "4", features = ["derive", "env"] }
tokio-postgres = { version = "0.7", features = ["with-uuid-1", "with-serde_json-1"] }

[target.'cfg(unix)'.dependencies]
nix = { version = "0.31", features = ["signal", "process", "fs", "user"] }

[profile.release]
lto = "thin"
codegen-units = 1
