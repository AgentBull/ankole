# Local/dev deployment of a single bullx-computerd worker.
# Run from packages/computer/docker:  docker compose up --build
services:
  bullx-computer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    # SYS_ADMIN + /dev/fuse are needed for bubblewrap + TigerFS (FUSE) inside the container.
    privileged: true
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    ports:
      - '8787:8787'
    volumes:
      - ./dev-workspaces:/workspaces
    environment:
      BULLX_COMPUTER_WORKER_ID: local-worker-1
      BULLX_COMPUTER_INSTANCE_ID: local-worker-1-dev
      BULLX_COMPUTER_BASE_URL: http://localhost:8787
      BULLX_AGENT_URL: http://host.docker.internal:3000
      BULLX_COMPUTER_WORKSPACE_ROOT: /workspaces
