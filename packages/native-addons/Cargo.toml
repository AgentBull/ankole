[package]
name = "agentbull-native-addons"
version = "0.1.0"
edition = "2024"
description = "Rust native addons for agentbull backend services"

[lib]
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[dependencies]
any_ascii = "0.3.3"
base64-simd = "0.8.0"
blake3 = "1.8.5"
bs58 = "0.5.1"
chacha20poly1305 = "0.10.1"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
chrono-tz = "0.10"
comrak = { version = "0.42", default-features = false }
crc32fast = "1.5.0"
cel = "0.13.0"
croner = "3"
globset = "0.4.18"
hex = "0.4.3"
infer = "0.19"
ipnet = "2"
rcgen = { version = "0.14", features = ["pem"] }
regex = "1"
time = "0.3"
indexmap = { version = "2.14.0", features = ["serde"] }
jsonwebtoken = { version = "10.4.0", features = ["aws_lc_rs"] }
mimalloc = "0.1.52"
napi = { version = "3.9.1", default-features = false, features = ["napi10", "tokio_rt", "serde-json-ordered", "object_indexmap"] }
napi-derive = "3.5.6"
radix_fmt = "1"
rand = { version = "0.10.1", features = ["sys_rng"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
siphasher = { version = "1", features = ["serde"] }
woothee = "0.13.0"
z85 = "3.0.7"

[dependencies.uuid]
version = "1.23.3"
features = ["v4","v7","fast-rng"]

[build-dependencies]
napi-build = "2.3.2"

[profile.release]
lto = true
codegen-units = 1

[profile.dev]
incremental = true
