name: ankole-dev

services:
  postgres:
    build:
      context: ./postgres-for-ankole
    image: postgres-for-ankole:dev
    command: ["postgres", "-c", "max_connections=${ANKOLE_POSTGRES_MAX_CONNECTIONS:-300}"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: just4local-dev
      POSTGRES_DB: ankole_development
    ports:
      - "${ANKOLE_POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_for_ankole_data:/var/lib/pgsql/18/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ankole_development"]
      interval: 2s
      timeout: 5s
      retries: 30

  redis:
    image: redis:latest
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${ANKOLE_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  postgres_for_ankole_data:
  redis_data:
