name: bullx-agent-dev

services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: just4local-dev
      POSTGRES_DB: bullx_development
    ports:
      - "${BULLX_POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bullx_development"]
      interval: 2s
      timeout: 5s
      retries: 30

  redis:
    image: redis:latest
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${BULLX_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 30

  computer:
    build:
      context: ../../packages/computer
      dockerfile: docker/Dockerfile
    privileged: true
    ports:
      - "${BULLX_COMPUTER_PORT:-8787}:8787"
    volumes:
      - ../../var/computer-dev:/workspaces
    environment:
      BULLX_COMPUTER_WORKER_ID: dev
      BULLX_COMPUTER_INSTANCE_ID: dev-local
      BULLX_COMPUTER_BASE_URL: "http://localhost:${BULLX_COMPUTER_PORT:-8787}"
      BULLX_AGENT_URL: "http://host.docker.internal:${HTTP_PORT:-3000}"
      BULLX_COMPUTER_WORKSPACE_ROOT: /workspaces
      DATABASE_URL: "postgres://postgres:just4local-dev@postgres:5432/bullx_development"
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/8787'"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  postgres_data:
  redis_data:
