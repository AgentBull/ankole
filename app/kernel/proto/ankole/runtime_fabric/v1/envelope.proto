syntax = "proto3";

package ankole.runtime_fabric.v1;

message ActorKey {
  string agent_uid = 1;
  string session_id = 2;
  reserved 3, 4;
}

message ActorTurnRef {
  // The control plane compares this full fence before accepting worker output.
  // Route identity alone is not durable because workers can reconnect.
  ActorKey actor = 1;
  string activation_uid = 2;
  uint64 actor_epoch = 3;
  string llm_turn_id = 4;
  uint32 revision = 5;
}

enum Lane {
  LANE_UNSPECIFIED = 0;
  LANE_CONTROL = 1;
  LANE_TURN = 2;
  LANE_PROGRESS = 3;
  LANE_RPC = 4;
}

enum DurabilityClass {
  DURABILITY_UNSPECIFIED = 0;
  CONTROL_DURABLE = 1;
  CONTROL_REPLAYABLE = 2;
  CONTROL_EPHEMERAL = 3;
}

message Envelope {
  uint32 protocol_version = 1;
  string message_id = 2;
  string correlation_id = 3;
  uint64 seq = 4;
  Lane lane = 5;
  int64 sent_at_unix_ms = 6;
  DurabilityClass durability = 7;

  oneof body {
    // Worker lifecycle messages describe homogeneous computer workers. They do
    // not negotiate per-worker features.
    AgentComputerWorkerReady worker_ready = 20;
    AgentComputerWorkerHeartbeat worker_heartbeat = 21;
    AgentComputerWorkerCapacity worker_capacity = 22;
    // Turn messages carry the local computer AI loop contract.
    TurnStart turn_start = 30;
    MailboxUpdated mailbox_updated = 31;
    TurnAccepted turn_accepted = 33;
    TurnControl turn_control = 34;
    WorkerProgress worker_progress = 35;
    TurnFinalProposal turn_final_proposal = 40;
    TurnError turn_error = 41;
    ControlShutdown control_shutdown = 50;
    RpcRequest rpc_request = 70;
    RpcResponse rpc_response = 71;
    RpcError rpc_error = 72;
  }

  // Field 32 was intentionally skipped to avoid reusing a removed
  // ActorInputDeliver-style design where single-input delivery was the protocol
  // body. Current turns carry the accepted input set instead.
  reserved 32;
  reserved 60, 61;
  reserved 100 to 199;
}

message AgentComputerWorkerReady {
  string worker_id = 1;
  string worker_instance_id = 2;
  // Runtime and version are observability metadata. Scheduling assumes workers
  // are equivalent because they boot from the same image.
  string runtime = 3;
  string version = 4;
  bytes capacity_json = 6;
  reserved 5;
  reserved 7 to 10;
}

message AgentComputerWorkerHeartbeat {
  string worker_id = 1;
  string worker_instance_id = 2;
  int64 monotonic_ms = 3;
  bytes load_json = 4;
}

message AgentComputerWorkerCapacity {
  string worker_id = 1;
  string worker_instance_id = 2;
  bytes capacity_json = 3;
  bytes load_json = 4;
  uint32 available_turn_slots = 5;
}

message ActorInputEnvelope {
  // This references the durable actor input row; it is not a replacement for
  // the control-plane input journal.
  string actor_input_id = 1;
  uint64 broker_sequence = 2;
  string type = 3;
  string ingress_event_id = 4;
  string provider_entry_id = 5;
  bytes payload_json = 6;
}

message TurnStart {
  // Starts one local computer turn for an ordered actor-input set.
  ActorTurnRef turn = 1;
  repeated ActorInputEnvelope inputs = 2;
  TurnModelRef model_ref = 3;
}

message TurnModelRef {
  string profile = 1;
  string provider_id = 2;
  string model = 3;
}

message MailboxUpdated {
  ActorKey actor = 1;
  string activation_uid = 2;
  uint64 actor_epoch = 3;
  string reason = 4;
  ActorTurnRef turn = 5;
  repeated ActorInputEnvelope inputs = 6;
}

message TurnAccepted {
  // Confirms the exact actor inputs the worker accepted before it proposes
  // output. The control plane requires this before final commit.
  ActorTurnRef turn = 1;
  repeated string accepted_actor_input_ids = 2;
}

message TurnControl {
  ActorTurnRef turn = 1;
  string command = 2;
  bytes payload_json = 3;
}

message WorkerProgress {
  ActorTurnRef turn = 1;
  string kind = 2;
  string summary = 3;
  bytes refs_json = 4;
}

message ProposedMessage {
  string role = 1;
  bytes content_json = 2;
  bytes metadata_json = 3;
}

message ProposedReply {
  string text = 1;
  bytes content_json = 2;
}

message TurnFinalProposal {
  // Worker output is still a proposal. The control plane owns the durable
  // transcript commit after checking the turn fence and delivery projections.
  ActorTurnRef turn = 1;
  repeated ProposedMessage messages = 2;
  ProposedReply reply = 3;
  bytes usage_json = 4;
  bytes provider_metadata_json = 5;
  string stop_reason = 6;
  bytes tool_results_json = 7;
}

message TurnError {
  ActorTurnRef turn = 1;
  string code = 2;
  string message = 3;
  bytes details_json = 4;
}

message ControlShutdown {
  string reason = 1;
}

message RpcRequest {
  string request_id = 1;
  string method = 2;
  int64 deadline_unix_ms = 3;
  bytes payload_json = 4;
}

message RpcResponse {
  string request_id = 1;
  bytes payload_json = 2;
}

message RpcError {
  string request_id = 1;
  string code = 2;
  string message = 3;
  bytes details_json = 4;
}
